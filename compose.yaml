services:
  frontend:
    container_name: frontend
    build:
      context: client
  postgres:
    image: postgres:17-alpine
    restart: always
    shm_size: 128mb
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: pass1234
  backend:
    build:
      context: server
    container_name: backend
    restart: always
    depends_on:
      - postgres
  proxy:
    image: nginx:1.26-alpine
    container_name: proxy
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf